kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: taloscontrolplanes.controlplane.cluster.x-k8s.io
spec:
  group: controlplane.cluster.x-k8s.io
  names:
    categories:
    - cluster-api
    kind: TalosControlPlane
    listKind: TalosControlPlaneList
    plural: taloscontrolplanes
    shortNames:
    - tcp
    singular: taloscontrolplane
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: TalosControlPlane API Server is ready to receive requests
      jsonPath: .status.ready
      name: Ready
      type: boolean
    - description: This denotes whether or not the control plane has the uploaded
        talos-config configmap
      jsonPath: .status.initialized
      name: Initialized
      type: boolean
    - description: Total number of non-terminated machines targeted by this control
        plane
      jsonPath: .status.replicas
      name: Replicas
      type: integer
    - description: Total number of fully running and ready control plane machines
      jsonPath: .status.readyReplicas
      name: Ready Replicas
      type: integer
    - description: Total number of unavailable machines targeted by this control plane
      jsonPath: .status.unavailableReplicas
      name: Unavailable Replicas
      type: integer
    name: v1alpha3
    schema:
      openAPIV3Schema:
        description: TalosControlPlane is the Schema for the taloscontrolplanes API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: TalosControlPlaneSpec defines the desired state of TalosControlPlane
            properties:
              controlPlaneConfig:
                description: |-
                  ControlPlaneConfig is a two TalosConfigSpecs
                  to use for initializing and joining machines to the control plane.
                properties:
                  controlplane:
                    description: TalosConfigSpec defines the desired state of TalosConfig
                    properties:
                      configPatches:
                        items:
                          properties:
                            op:
                              type: string
                            path:
                              type: string
                            value:
                              x-kubernetes-preserve-unknown-fields: true
                          required:
                          - op
                          - path
                          type: object
                        type: array
                      data:
                        type: string
                      generateType:
                        type: string
                      hostname:
                        description: Set hostname in the machine configuration to
                          some value.
                        properties:
                          source:
                            description: |-
                              Source of the hostname.

                              Allowed values:
                              "MachineName" (use linked Machine's Name).
                              "InfrastructureName" (use linked Machine's infrastructure's name).
                            type: string
                        type: object
                      strategicPatches:
                        description: Talos Linux machine configuration strategic merge
                          patch list.
                        items:
                          type: string
                        type: array
                      talosVersion:
                        type: string
                    required:
                    - generateType
                    type: object
                  init:
                    description: 'Deprecated: starting from cacppt v0.4.0 provider
                      doesn''t use init configs.'
                    properties:
                      configPatches:
                        items:
                          properties:
                            op:
                              type: string
                            path:
                              type: string
                            value:
                              x-kubernetes-preserve-unknown-fields: true
                          required:
                          - op
                          - path
                          type: object
                        type: array
                      data:
                        type: string
                      generateType:
                        type: string
                      hostname:
                        description: Set hostname in the machine configuration to
                          some value.
                        properties:
                          source:
                            description: |-
                              Source of the hostname.

                              Allowed values:
                              "MachineName" (use linked Machine's Name).
                              "InfrastructureName" (use linked Machine's infrastructure's name).
                            type: string
                        type: object
                      strategicPatches:
                        description: Talos Linux machine configuration strategic merge
                          patch list.
                        items:
                          type: string
                        type: array
                      talosVersion:
                        type: string
                    required:
                    - generateType
                    type: object
                required:
                - controlplane
                type: object
              machineNamingStrategy:
                description: |-
                  MachineNamingStrategy allows changing the naming pattern used when creating control plane Machines.
                  InfraMachines and bootstrap configs use the same name as the corresponding Machine.
                properties:
                  template:
                    description: |-
                      Template defines the template to use for generating the names of control plane Machine objects.
                      If not defined, it falls back to `{{ .talosControlPlane.name }}-{{ .random }}`.
                      If the generated name string exceeds 63 characters, it is trimmed to 58 characters and
                      concatenated with a random suffix of length 5.
                      The template allows the following variables:
                      * `.cluster.name`: the Cluster name.
                      * `.talosControlPlane.name`: the TalosControlPlane name.
                      * `.random`: a random alphanumeric string without vowels of length 5.
                    maxLength: 256
                    minLength: 1
                    type: string
                type: object
              machineTemplate:
                description: |-
                  MachineTemplate contains information about how control plane Machines should be shaped.
                  This is the Cluster API v1beta2 control plane contract field consumed by ClusterClass / topology.
                properties:
                  metadata:
                    description: ObjectMeta is the standard object's metadata.
                    minProperties: 1
                    properties:
                      annotations:
                        additionalProperties:
                          type: string
                        description: |-
                          annotations is an unstructured key value map stored with a resource that may be
                          set by external tools to store and retrieve arbitrary metadata. They are not
                          queryable and should be preserved when modifying objects.
                          More info: http://kubernetes.io/docs/user-guide/annotations
                        type: object
                      labels:
                        additionalProperties:
                          type: string
                        description: |-
                          labels is a map of string keys and values that can be used to organize and categorize
                          (scope and select) objects. May match selectors of replication controllers
                          and services.
                          More info: http://kubernetes.io/docs/user-guide/labels
                        type: object
                    type: object
                  spec:
                    description: Spec is the specification of the desired behavior
                      of the machine template.
                    minProperties: 1
                    properties:
                      deletion:
                        description: Deletion contains configuration options for Machine
                          deletion.
                        minProperties: 1
                        properties:
                          nodeDeletionTimeoutSeconds:
                            description: |-
                              NodeDeletionTimeoutSeconds defines, in seconds, how long the controller will attempt to
                              delete the Node that is hosted by a Machine after the Machine is marked for deletion. A
                              duration of 0 will retry deletion indefinitely. Defaults to 10 seconds when omitted.
                            format: int32
                            minimum: 0
                            type: integer
                          nodeDrainTimeoutSeconds:
                            description: |-
                              NodeDrainTimeoutSeconds is the total amount of time, in seconds, that the controller will
                              spend draining a control plane node. The default value is 0, meaning that the node can be
                              drained without any time limitations.
                              NOTE: NodeDrainTimeoutSeconds is different from `kubectl drain --timeout`.
                            format: int32
                            minimum: 0
                            type: integer
                          nodeVolumeDetachTimeoutSeconds:
                            description: |-
                              NodeVolumeDetachTimeoutSeconds is the total amount of time, in seconds, that the controller
                              will spend waiting for all volumes to be detached. The default value is 0, meaning that the
                              volumes can be detached without any time limitations.
                            format: int32
                            minimum: 0
                            type: integer
                        type: object
                      infrastructureRef:
                        description: |-
                          InfrastructureRef is a required reference to a custom resource offered by an infrastructure provider.
                          For ClusterClass / topology, this field is populated from
                          ClusterClass.spec.controlPlane.machineInfrastructure.templateRef.
                        properties:
                          apiGroup:
                            description: |-
                              apiGroup is the group of the resource being referenced.
                              apiGroup must be fully qualified domain name.
                              The corresponding version for this reference will be looked up from the contract
                              labels of the corresponding CRD of the resource being referenced.
                            maxLength: 253
                            minLength: 1
                            pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                            type: string
                          kind:
                            description: |-
                              kind of the resource being referenced.
                              kind must consist of alphanumeric characters or '-', start with an alphabetic character, and end with an alphanumeric character.
                            maxLength: 63
                            minLength: 1
                            pattern: ^[a-zA-Z]([-a-zA-Z0-9]*[a-zA-Z0-9])?$
                            type: string
                          name:
                            description: |-
                              name of the resource being referenced.
                              name must consist of lower case alphanumeric characters, '-' or '.', and must start and end with an alphanumeric character.
                            maxLength: 253
                            minLength: 1
                            pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                            type: string
                        required:
                        - apiGroup
                        - kind
                        - name
                        type: object
                      readinessGates:
                        description: |-
                          ReadinessGates specifies additional conditions to include when evaluating the Machine
                          Ready condition.
                        items:
                          description: MachineReadinessGate contains the type of a
                            Machine condition to be used as a readiness gate.
                          properties:
                            conditionType:
                              description: |-
                                conditionType refers to a condition with matching type in the Machine's condition list.
                                If the conditions doesn't exist, it will be treated as unknown.
                                Note: Both Cluster API conditions or conditions added by 3rd party controllers can be used as readiness gates.
                              maxLength: 316
                              minLength: 1
                              pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                              type: string
                            polarity:
                              description: |-
                                polarity of the conditionType specified in this readinessGate.
                                Valid values are Positive, Negative and omitted.
                                When omitted, the default behaviour will be Positive.
                                A positive polarity means that the condition should report a true status under normal conditions.
                                A negative polarity means that the condition should report a false status under normal conditions.
                              enum:
                              - Positive
                              - Negative
                              type: string
                          required:
                          - conditionType
                          type: object
                        maxItems: 32
                        minItems: 1
                        type: array
                        x-kubernetes-list-map-keys:
                        - conditionType
                        x-kubernetes-list-type: map
                    required:
                    - infrastructureRef
                    type: object
                type: object
              replicas:
                description: |-
                  Number of desired machines. Defaults to 1. When stacked etcd is used only
                  odd numbers are permitted, as per [etcd best practice](https://etcd.io/docs/v3.3.12/faq/#why-an-odd-number-of-cluster-members).
                  This is a pointer to distinguish between explicit zero and not specified.
                format: int32
                type: integer
              rolloutStrategy:
                default:
                  rollingUpdate:
                    maxSurge: 1
                  type: RollingUpdate
                description: |-
                  The RolloutStrategy to use to replace control plane machines with
                  new ones.
                properties:
                  rollingUpdate:
                    description: |-
                      Rolling update config params. Present only if
                      RolloutStrategyType = RollingUpdate.
                    properties:
                      maxSurge:
                        anyOf:
                        - type: integer
                        - type: string
                        description: |-
                          The maximum number of control planes that can be scheduled above or under the
                          desired number of control planes.
                          Value can be an absolute number 1 or 0.
                          Defaults to 1.
                          Example: when this is set to 1, the control plane can be scaled
                          up immediately when the rolling update starts.
                        x-kubernetes-int-or-string: true
                    type: object
                  type:
                    description: |-
                      Change rollout strategy.

                      Supported strategies:
                       * "RollingUpdate".
                       * "OnDelete"

                      Default is RollingUpdate.
                    type: string
                type: object
              version:
                description: Version defines the desired Kubernetes version.
                minLength: 2
                pattern: ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)([-0-9a-zA-Z_\.+]*)?$
                type: string
            required:
            - controlPlaneConfig
            - version
            type: object
          status:
            description: TalosControlPlaneStatus defines the observed state of TalosControlPlane
            properties:
              availableReplicas:
                description: |-
                  AvailableReplicas is the number of available replicas for this ControlPlane.
                  A machine is considered available when Machine's Available condition is true.
                format: int32
                type: integer
              bootstrapped:
                description: |-
                  Bootstrapped denotes whether any nodes received bootstrap request
                  which is required to start etcd and Kubernetes components in Talos.
                type: boolean
              conditions:
                description: Conditions defines the current service state of the TalosControlPlane.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              failureMessage:
                description: |-
                  ErrorMessage indicates that there is a terminal problem reconciling the
                  state, and will be set to a descriptive error message.
                type: string
              failureReason:
                description: |-
                  FailureReason indicates that there is a terminal problem reconciling the
                  state, and will be set to a token value suitable for
                  programmatic interpretation.
                type: string
              initialization:
                description: |-
                  initialization provides observations of the TalosControlPlane initialization process.
                  NOTE: Fields in this struct are part of the Cluster API contract and are used to orchestrate
                  initial Machine provisioning.
                minProperties: 1
                properties:
                  controlPlaneInitialized:
                    description: |-
                      controlPlaneInitialized is true when the TalosControlPlane provider reports that the
                      Kubernetes control plane is initialized; A control plane is considered initialized when
                      it can accept requests, no matter if this happens before the control plane is fully
                      provisioned or not.
                      NOTE: this field is part of the Cluster API contract, and it is used to orchestrate
                      initial Machine provisioning.
                    type: boolean
                type: object
              initialized:
                description: |-
                  Initialized denotes whether or not the control plane has the
                  uploaded talos-config configmap.
                type: boolean
              observedGeneration:
                description: ObservedGeneration is the latest generation observed
                  by the controller.
                format: int64
                type: integer
              ready:
                description: |-
                  Ready denotes that the TalosControlPlane API Server is ready to
                  receive requests.
                type: boolean
              readyReplicas:
                description: Total number of fully running and ready control plane
                  machines.
                format: int32
                type: integer
              replicas:
                description: |-
                  Total number of non-terminated machines targeted by this control plane
                  (their labels match the selector).
                format: int32
                type: integer
              selector:
                description: |-
                  Selector is the label selector in string format to avoid introspection
                  by clients, and is used to provide the CRD-based integration for the
                  scale subresource and additional integrations for things like kubectl
                  describe.. The string will be in the same format as the query-param syntax.
                  More info about label selectors: http://kubernetes.io/docs/user-guide/labels#label-selectors
                type: string
              unavailableReplicas:
                description: |-
                  Total number of unavailable machines targeted by this control plane.
                  This is the total number of machines that are still required for
                  the deployment to have 100% available capacity. They may either
                  be machines that are running but not yet ready or machines
                  that still have not been created.
                format: int32
                type: integer
              upToDateReplicas:
                description: |-
                  UpToDateReplicas is the number of up-to-date replicas targeted by this ControlPlane.
                  A machine is considered up to date when Machine's UpToDate condition is true.
                format: int32
                type: integer
              updatedReplicas:
                description: Total number of non-terminated Machines targeted by this
                  control plane that have the desired spec.
                format: int32
                type: integer
              version:
                description: |-
                  version represents the minimum Kubernetes version for the control plane machines
                  in the cluster.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      scale:
        labelSelectorPath: .status.selector
        specReplicasPath: .spec.replicas
        statusReplicasPath: .status.replicas
      status: {}
